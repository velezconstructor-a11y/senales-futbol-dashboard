<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReyBetIA — El Rey de Ambos Marcan</title>
<link rel="icon" href="./favicon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --pitch-950:#0a1f1f;
    --pitch-900:#0f2a2a;
    --pitch-800:#163a3a;
    --pitch-700:#1e4a4a;
    --line:#2b4f4f;
    --chalk:#f4f7f2;
    --chalk-dim:#b9c9bd;
    --amber:#d19a3d;
    --amber-dim:#6b4a1a;
    --win:#4cb56d;
    --win-bg:rgba(76,181,109,0.12);
    --loss:#e2564c;
    --loss-bg:rgba(226,86,76,0.12);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, var(--pitch-800), transparent),
      repeating-linear-gradient(90deg, transparent 0 79px, rgba(244,247,242,0.025) 79px 80px),
      var(--pitch-950);
    color:var(--chalk);
    font-family:var(--sans);
    min-height:100vh;
    padding:0 0 64px;
  }
  a{color:var(--amber);}
  .wrap{max-width:980px;margin:0 auto;padding:0 20px;}

  header.top{
    padding:28px 20px 20px;
    text-align:center;
    border-bottom:1px solid var(--line);
    margin-bottom:0;
    background: radial-gradient(ellipse 500px 200px at 50% 0%, rgba(209,154,61,0.08), transparent);
  }
  .logo-img{
    width:64px;height:64px;border-radius:50%;
    border:2px solid var(--amber-dim);
    box-shadow:0 0 24px rgba(209,154,61,0.25);
    margin-bottom:10px;
  }
  .brand{
    font-family:var(--mono);
    font-weight:700;
    font-size:24px;
    letter-spacing:.02em;
    margin:0;
  }
  .brand span{color:var(--amber);}
  .tagline{
    font-size:11px;
    color:var(--chalk-dim);
    text-transform:uppercase;
    letter-spacing:.15em;
    margin:4px 0 0;
    font-family:var(--mono);
  }
  .updated{
    font-size:11px;
    color:var(--chalk-dim);
    margin-top:8px;
    font-family:var(--mono);
  }
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--win);margin-right:6px;vertical-align:1px;
    box-shadow:0 0 8px var(--win);}

  .hero-pick{
    max-width:980px;margin:20px auto 0;padding:0 20px;
  }
  .hero-pick-card{
    position:relative;
    background:linear-gradient(135deg, var(--pitch-800) 0%, var(--pitch-900) 60%);
    border:1px solid var(--amber-dim);
    border-radius:14px;
    padding:20px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    box-shadow:0 0 40px rgba(209,154,61,0.08);
  }
  .hero-pick-badge{
    font-family:var(--mono);font-size:11px;font-weight:700;
    color:var(--pitch-950);background:var(--amber);
    padding:4px 10px;border-radius:20px;letter-spacing:.05em;
    display:inline-block;margin-bottom:8px;
  }
  .hero-pick-teams{font-size:19px;font-weight:700;}
  .hero-pick-liga{font-size:12px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
  .hero-pick-right{text-align:right;font-family:var(--mono);}
  .hero-pick-pct{font-size:32px;font-weight:700;color:var(--amber);line-height:1;}
  .hero-pick-mkt{font-size:11px;color:var(--chalk-dim);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
  @media (max-width:600px){.hero-pick-card{flex-direction:column;align-items:flex-start;}.hero-pick-right{text-align:left;}}

  .tabs{
    display:flex;
    overflow-x:auto;
    gap:4px;
    padding:14px 20px 0;
    border-bottom:1px solid var(--line);
    -ms-overflow-style:none;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex-shrink:0;
    background:transparent;
    border:none;
    color:var(--chalk-dim);
    font-family:var(--mono);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.05em;
    padding:10px 16px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:color .15s;
  }
  .tab-btn:hover{color:var(--chalk);}
  .tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
  .tab-panel{display:none;padding-top:28px;}
  .tab-panel.active{display:block;}

  .section-title{
    font-family:var(--mono);
    text-transform:uppercase;
    letter-spacing:.12em;
    font-size:12px;
    color:var(--chalk-dim);
    display:flex;
    align-items:center;
    gap:12px;
    margin:0 0 16px;
  }
  .section-title::after{content:"";flex:1;height:1px;background:var(--line);}
  section{margin-bottom:40px;}

  .market-hero{text-align:center;padding:20px 0 8px;}
  .market-hero .big{
    font-family:var(--mono);
    font-weight:700;
    font-size:clamp(40px,10vw,64px);
    line-height:1;
    background:linear-gradient(180deg, var(--chalk) 0%, var(--chalk-dim) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    margin:0;
  }
  .market-hero .sub{font-size:13px;color:var(--chalk-dim);margin-top:6px;font-family:var(--mono);}

  .conf-card{
    position:relative;
    background:linear-gradient(160deg, var(--pitch-800), var(--pitch-900));
    border:1px solid var(--amber-dim);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:10px;
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:14px;
    align-items:center;
  }
  .conf-teams{font-weight:600;font-size:15px;}
  .conf-liga{font-size:11px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
  .conf-tier{text-align:center;font-family:var(--mono);}
  .conf-tier-val{font-weight:700;font-size:15px;color:var(--amber);}
  .conf-cuota{font-family:var(--mono);font-size:12px;color:var(--chalk-dim);margin-top:2px;}
  .conf-prob{font-family:var(--mono);font-size:20px;font-weight:700;text-align:right;}
  @media (max-width:600px){.conf-card{grid-template-columns:1fr;text-align:left;}.conf-prob{text-align:left;}}

  .match-list{border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .match-row{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:12px;
    align-items:center;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .match-row:last-child{border-bottom:none;}
  .match-row:nth-child(even){background:rgba(244,247,242,0.015);}
  .match-teams{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .match-liga{font-size:10px;color:var(--chalk-dim);text-transform:uppercase;}
  .match-pct{font-family:var(--mono);font-size:12px;color:var(--chalk-dim);text-align:right;white-space:nowrap;}
  .match-badge{
    font-family:var(--mono);font-size:11px;font-weight:700;
    padding:3px 10px;border-radius:20px;text-align:center;min-width:34px;
  }
  .match-badge.ganada{background:var(--win-bg);color:var(--win);}
  .match-badge.perdida{background:var(--loss-bg);color:var(--loss);}
  .match-badge.si{background:var(--win-bg);color:var(--win);}
  .match-badge.no{background:var(--loss-bg);color:var(--loss);}
  .match-badge.score{background:var(--pitch-700);color:var(--amber);min-width:44px;}

  @media (max-width:420px){
    .match-row{grid-template-columns:1fr;text-align:left;gap:6px;}
    .match-pct{text-align:left;}
  }

  .empty{text-align:center;padding:40px 20px;color:var(--chalk-dim);font-family:var(--mono);font-size:13px;}

  .tickets{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px,1fr));gap:16px;}
  .ticket{position:relative;background:var(--pitch-800);border:1px solid var(--line);border-radius:10px;padding:20px 18px 16px;}
  .ticket::before,.ticket::after{content:"";position:absolute;width:16px;height:16px;background:var(--pitch-950);border:1px solid var(--line);border-radius:50%;top:50%;transform:translateY(-50%);}
  .ticket::before{left:-9px;}
  .ticket::after{right:-9px;}
  .ticket-name{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--chalk-dim);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ticket-status{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .ticket-status.win{background:var(--win);box-shadow:0 0 6px var(--win);}
  .ticket-status.loss{background:var(--loss);box-shadow:0 0 6px var(--loss);}
  .ticket-status.none{background:#445c4e;}
  .ticket-pct{font-family:var(--mono);font-weight:700;font-size:34px;line-height:1;}
  .ticket-meta{font-family:var(--mono);font-size:12px;color:var(--chalk-dim);margin-top:8px;display:flex;justify-content:space-between;border-top:1px dashed var(--line);padding-top:10px;}
  .ticket-units{font-weight:600;}
  .ticket-units.win{color:var(--win);}
  .ticket-units.loss{color:var(--loss);}

  .cmp-table{width:100%;border-collapse:collapse;font-size:14px;}
  .cmp-table th{text-align:left;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--chalk-dim);font-weight:500;padding:0 10px 10px;border-bottom:1px solid var(--line);}
  .cmp-table th.num, .cmp-table td.num{text-align:right;font-family:var(--mono);}
  .cmp-table td{padding:10px;border-bottom:1px solid var(--line);}
  .cmp-table tr:last-child td{border-bottom:none;}
  .cmp-table td.name{display:flex;align-items:center;gap:8px;}
  .row-alt td{background:rgba(244,247,242,0.015);}

  .chart-card{background:var(--pitch-800);border:1px solid var(--line);border-radius:10px;padding:20px;}
  .chart-wrap{position:relative;height:220px;}

  .bars{display:flex;flex-direction:column;gap:10px;}
  .bar-row{display:grid;grid-template-columns:140px 1fr 90px;align-items:center;gap:12px;font-size:13px;}
  .bar-label{color:var(--chalk-dim);font-family:var(--mono);font-size:12px;}
  .bar-track{height:8px;background:var(--pitch-700);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;}
  .bar-fill.win{background:var(--win);}
  .bar-fill.loss{background:var(--loss);}
  .bar-num{font-family:var(--mono);font-size:12px;text-align:right;color:var(--chalk-dim);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:32px;}
  @media (max-width:700px){.grid2{grid-template-columns:1fr;gap:28px;}}

  .picks{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .pick{display:grid;grid-template-columns:70px 1fr auto auto;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;}
  .pick:last-child{border-bottom:none;}
  .pick:nth-child(even){background:rgba(244,247,242,0.015);}
  .pick-date{font-family:var(--mono);font-size:11px;color:var(--chalk-dim);}
  .pick-teams{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pick-tier{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--amber-dim);color:var(--amber);white-space:nowrap;}
  .pick-result{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .pick-result.win{background:var(--win-bg);color:var(--win);}
  .pick-result.loss{background:var(--loss-bg);color:var(--loss);}
  .pick-result.pending{background:var(--pitch-700);color:var(--chalk-dim);}

  footer.note{text-align:center;font-family:var(--mono);font-size:12px;color:var(--chalk-dim);padding-top:24px;line-height:1.7;}
  .loading, .error{text-align:center;padding:60px 20px;color:var(--chalk-dim);font-family:var(--mono);font-size:13px;}
  .error{color:var(--loss);}
  ::selection{background:var(--amber);color:var(--pitch-950);}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<header class="top">
  <img class="logo-img" src="./logo-header.png" alt="ReyBetIA" />
  <p class="brand">REY<span>BET</span>IA</p>
  <p class="tagline">El Rey de Ambos Marcan</p>
  <p class="updated" id="updatedTxt"><span class="dot"></span>Cargando…</p>
</header>

<div class="hero-pick" id="heroPick"></div>

<nav class="tabs" id="tabs"></nav>

<div class="wrap" id="app">
  <div class="loading">Cargando pronósticos…</div>
</div>

<script>
const DATA_URL = "./dashboard_data.json";

const TABS = [
  {id:"btts",  label:"Ambos Marcan"},
  {id:"o15",   label:"Over 1.5"},
  {id:"o25",   label:"Over 2.5"},
  {id:"combo", label:"BTTS+O2.5"},
  {id:"score", label:"Marcador Exacto"},
  {id:"stats", label:"Estadísticas"},
];

let DATA = null;
let HOY_STR = "";

function diaBadge(p){
  if(!p.fecha) return "";
  const fechaSolo = p.fecha.split(" ")[0];
  if(fechaSolo === HOY_STR) return '<span style="color:var(--win);">HOY</span>';
  return '<span style="color:var(--amber);">MAÑANA</span>';
}

function pctTxt(s, conN){
  if(!s) return "—";
  const n = s.bets ?? s.total ?? 0;
  if(n === 0) return "—";
  const wins = s.wins ?? s.ganados ?? 0;
  const pct = s.acierto_pct.toFixed(0) + "%";
  return conN ? `${pct} (${wins}/${n})` : pct;
}
function nOf(s){ return s ? (s.bets ?? s.total ?? 0) : 0; }
function statusClass(s){
  if(!s || nOf(s) === 0) return "none";
  return (s.profit_u ?? 0) >= 0 ? "win" : "loss";
}

function badgesExtra(p){
  const badges = [];
  if(p.vip_elite) badges.push(`<span class="pick-tier">⭐ ${p.vip_elite}</span>`);
  if(p.nivel_confianza){
    const emoji = {"ÉLITE":"🥇","PLATA":"🥈","BRONCE":"🥉"}[p.nivel_confianza] || "🏅";
    badges.push(`<span class="pick-tier">${emoji} ${p.nivel_confianza}</span>`);
  }
  if(p.oro) badges.push(`<span class="pick-tier">🟡 ${p.oro}</span>`);
  return badges.length ? `<div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;">${badges.join("")}</div>` : "";
}

function renderMercado(picks, probKey, senalKey, tierKey, cuotaKey, resultadoDeseado, resultKey){
  // "Mayor confianza" = decision JUGAR Y el nivel es un nivel real de confianza
  // (VIP+/VIP/Fuerte) - NO incluye señales "Evitar" rescatadas a JUGAR por una
  // regla especial, porque esas no son de alta confianza aunque tecnicamente jueguen.
  const conSenal = picks.filter(p => p[senalKey] === "JUGAR" && p[tierKey] && p[tierKey] !== "Evitar");
  const confianzaHtml = conSenal.length === 0
    ? '<div class="empty">Sin señales de mayor confianza hoy todavía.</div>'
    : conSenal.map(p => {
        const resultado = resultKey ? p[resultKey] : null;
        const resultadoHtml = resultado === true
          ? `<div class="conf-prob" style="color:var(--win);font-size:15px;">✓ Ganada</div>`
          : resultado === false
          ? `<div class="conf-prob" style="color:var(--loss);font-size:15px;">✕ Perdida</div>`
          : `<div class="conf-prob">${p[probKey] != null ? (p[probKey]*100).toFixed(0)+"%" : "—"}</div>`;
        return `
        <div class="conf-card">
          <div>
            <div class="conf-teams">${p.local} vs ${p.visitante}</div>
            <div class="conf-liga">${p.liga || ""} · ${diaBadge(p)}</div>
            ${badgesExtra(p)}
          </div>
          <div class="conf-tier">
            <div class="conf-tier-val">${p[tierKey] || "JUGAR"}</div>
            <div class="conf-cuota">cuota ${p[cuotaKey] ? p[cuotaKey].toFixed(2) : "—"}</div>
          </div>
          ${resultadoHtml}
        </div>`;
      }).join("");

  // Top probabilidad: independiente de si el modelo disparo formalmente "JUGAR"
  // (que es un criterio estricto de VIP+/VIP/Fuerte) - esto muestra los
  // partidos con la probabilidad mas alta de este mercado, punto, para que
  // siempre haya algo que ver aunque hoy no haya ninguna señal formal.
  const idsConSenal = new Set(conSenal.map(p => p.local + "|" + p.visitante + "|" + p.fecha));
  const topProb = picks
    .filter(p => p[probKey] != null && !idsConSenal.has(p.local + "|" + p.visitante + "|" + p.fecha))
    .sort((a, b) => b[probKey] - a[probKey])
    .slice(0, 5);
  const topProbHtml = topProb.length === 0
    ? '<div class="empty">Sin datos suficientes todavía.</div>'
    : topProb.map(p => `
        <div class="conf-card">
          <div>
            <div class="conf-teams">${p.local} vs ${p.visitante}</div>
            <div class="conf-liga">${p.liga || ""} · ${diaBadge(p)}</div>
            ${badgesExtra(p)}
          </div>
          <div class="conf-tier">
            <div class="conf-tier-val" style="color:var(--chalk-dim);font-size:12px;">${p[tierKey] || "sin señal formal"}</div>
            <div class="conf-cuota">cuota ${p[cuotaKey] ? p[cuotaKey].toFixed(2) : "—"}</div>
          </div>
          <div class="conf-prob">${(p[probKey]*100).toFixed(0)}%</div>
        </div>`).join("");

  const todosHtml = picks.length === 0
    ? '<div class="empty">Todavía no hay partidos analizados hoy.</div>'
    : '<div class="match-list">' + picks.map(p => {
        const prob = p[probKey];
        const cuotaTxt = p[cuotaKey] ? p[cuotaKey].toFixed(2) : "—";
        const pctT = prob != null ? `${(prob*100).toFixed(0)}%` : "s/d";
        const resultado = resultKey ? p[resultKey] : null;
        let badgeClass, badgeTxt;
        if(resultado === true){ badgeClass = "ganada"; badgeTxt = "✓ Ganada"; }
        else if(resultado === false){ badgeClass = "perdida"; badgeTxt = "✕ Perdida"; }
        else {
          const siNo = prob == null ? null : (prob >= 0.5 ? "si" : "no");
          badgeClass = siNo || "";
          badgeTxt = siNo === "si" ? "Sí" : siNo === "no" ? "No" : "Sin datos";
        }
        const tierTxt = (p[tierKey] && p[tierKey] !== "Evitar") ? `<span style="color:var(--amber);">${p[tierKey]}</span> · ` : "";
        return `
          <div class="match-row">
            <div>
              <div class="match-teams">${p.local} vs ${p.visitante}</div>
              <div class="match-liga">${tierTxt}${p.liga || ""} · ${diaBadge(p)}</div>
              ${badgesExtra(p)}
            </div>
            <span class="match-pct">cuota ${cuotaTxt} · ${pctT}</span>
            <span class="match-badge ${badgeClass}">${badgeTxt}</span>
          </div>`;
      }).join("") + '</div>';

  return `
    <section>
      <p class="section-title">⭐ Mayor confianza</p>
      ${confianzaHtml}
    </section>
    <section>
      <p class="section-title">🔝 Mayor probabilidad</p>
      ${topProbHtml}
    </section>
    <section>
      <p class="section-title">Todos los partidos analizados — ${resultadoDeseado}</p>
      ${todosHtml}
    </section>`;
}

function renderCombo(picks){
  const elegibles = picks.filter(p => p.senal_btts_o25 && p.senal_btts_o25 !== "—");
  if(elegibles.length === 0){
    return '<div class="empty">Hoy ningún partido cumple el criterio para la combinada BTTS + Over 2.5.</div>';
  }
  return '<div class="match-list">' + elegibles.map(p => {
    const cuotaCombo = (p.cuota_btts && p.cuota_o25) ? (p.cuota_btts * p.cuota_o25).toFixed(2) : "—";
    return `
      <div class="match-row">
        <div>
          <div class="match-teams">${p.local} vs ${p.visitante}</div>
          <div class="match-liga">${p.liga || ""} · ${diaBadge(p)}</div>
        </div>
        <span class="match-pct">cuota ${cuotaCombo}</span>
        <span class="match-badge ${p.senal_btts_o25 === 'VIP' ? 'si' : 'no'}">${p.senal_btts_o25}</span>
      </div>`;
  }).join("") + '</div>';
}

function renderMarcadorExacto(picks, stats){
  const conPred = picks.filter(p => p.marcador_exacto_sugerido);
  const heroHtml = stats && stats.total > 0 ? `
    <div class="market-hero">
      <p class="big">${stats.acierto_pct.toFixed(0)}%</p>
      <p class="sub">acierto histórico en ${stats.total} partidos · sin cuota disponible, solo %acierto</p>
    </div>` : `
    <div class="market-hero">
      <p class="sub">Todavía no hay suficiente historial para medir el %acierto.</p>
    </div>`;

  const listaHtml = conPred.length === 0
    ? '<div class="empty">Sin pronósticos de marcador para hoy.</div>'
    : '<div class="match-list">' + conPred.map(p => {
        const real = p.marcador_exacto_real;
        const acerto = real ? (real === p.marcador_exacto_sugerido) : null;
        const badgeHtml = real
          ? `<span class="match-badge ${acerto ? 'ganada' : 'perdida'}">${p.marcador_exacto_sugerido} ${acerto ? '✓' : `(real ${real})`}</span>`
          : `<span class="match-badge score">${p.marcador_exacto_sugerido}</span>`;
        return `
        <div class="match-row" style="grid-template-columns:1fr auto;">
          <div>
            <div class="match-teams">${p.local} vs ${p.visitante}</div>
            <div class="match-liga">${p.liga || ""} · ${diaBadge(p)}</div>
          </div>
          ${badgeHtml}
        </div>`;
      }).join("") + '</div>';

  return heroHtml + `<section><p class="section-title">Pronósticos de hoy</p>${listaHtml}</section>`;
}

const MERCADO_ORDEN = ["BTTS", "Over 1.5", "Over 2.5", "BTTS + Over 2.5 (VIP)"];
const CATEGORIA_ORDEN = ["VIP+","VIP","Fuerte","ORO_FUERTE","ORO_BTTS","ÉLITE","PLATA","BRONCE","VIP ELITE"];

function renderTickets(comparativo){
  const hist = comparativo.historico.mercados;
  return MERCADO_ORDEN.map(nombre => {
    const s = hist[nombre];
    const cls = statusClass(s);
    const n = nOf(s);
    const units = n ? `${s.profit_u >= 0 ? "+" : ""}${s.profit_u.toFixed(1)}u` : "—";
    return `
      <div class="ticket">
        <div class="ticket-name"><span>${nombre}</span><span class="ticket-status ${cls}"></span></div>
        <div class="ticket-pct">${pctTxt(s)}</div>
        <div class="ticket-meta"><span>${n} caso${n===1?"":"s"}</span><span class="ticket-units ${cls}">${units}</span></div>
      </div>`;
  }).join("");
}

function renderCmpTable(comparativo){
  const {hoy, recientes, historico} = comparativo;
  const filas = MERCADO_ORDEN.map((nombre, i) => {
    const sh = hoy.mercados[nombre], sr = recientes.mercados[nombre], st = historico.mercados[nombre];
    return `
      <tr class="${i%2? 'row-alt':''}">
        <td class="name"><span class="ticket-status ${statusClass(st)}"></span>${nombre}</td>
        <td class="num">${pctTxt(sh)}</td>
        <td class="num">${pctTxt(sr)}</td>
        <td class="num"><b>${pctTxt(st, true)}</b></td>
      </tr>`;
  }).join("");
  return `<table class="cmp-table"><thead><tr><th>Mercado</th><th class="num">Hoy</th><th class="num">7 días</th><th class="num">Histórico</th></tr></thead><tbody>${filas}</tbody></table>`;
}

function renderBars(dictHist, orden){
  const nombres = orden.filter(n => dictHist[n] && nOf(dictHist[n]) > 0);
  if(nombres.length === 0) return '<div class="empty">Sin datos todavía en esta sección.</div>';
  return '<div class="bars">' + nombres.map(nombre => {
    const st = dictHist[nombre];
    const pct = st.acierto_pct ?? 0;
    const cls = statusClass(st);
    return `<div class="bar-row"><span class="bar-label">${nombre}</span><div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div><span class="bar-num">${pctTxt(st, true)}</span></div>`;
  }).join("") + '</div>';
}

function renderPicksResueltos(picks){
  if(!picks || picks.length === 0) return '<div class="empty">Todavía no hay picks resueltos.</div>';
  return '<div class="picks">' + picks.slice(0, 25).map(p => {
    let resClass = "pending", resTxt = "?";
    if(p.resultado_btts === true){ resClass = "win"; resTxt = "✓"; }
    else if(p.resultado_btts === false){ resClass = "loss"; resTxt = "✕"; }
    const fecha = (p.fecha || "").split(" ")[0].slice(5);
    return `<div class="pick"><span class="pick-date">${fecha}</span><span class="pick-teams">${p.local} vs ${p.visitante}</span><span class="pick-tier">${p.senal_btts_optimizada || "—"}</span><span class="pick-result ${resClass}">${resTxt}</span></div>`;
  }).join("") + '</div>';
}

function renderChart(serie){
  if(!serie || serie.length < 2) return;
  const ctx = document.getElementById("trendChart");
  if(!ctx) return;
  new Chart(ctx, {
    type: "line",
    data: {
      labels: serie.map(d => d.fecha.slice(5)),
      datasets: [{
        label: "% acierto BTTS por día", data: serie.map(d => d.acierto_pct),
        borderColor: "#e8a33d", backgroundColor: "rgba(232,163,61,0.12)",
        borderWidth: 2, tension: 0.3, fill: true, pointRadius: 3, pointBackgroundColor: "#e8a33d",
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:false } },
      scales: {
        y: { min:0, max:100, ticks:{ color:"#b9c9bd", callback:v=>v+"%" }, grid:{ color:"#2b4a38" } },
        x: { ticks:{ color:"#b9c9bd" }, grid:{ display:false } },
      }
    }
  });
}

function renderCalibracion(calibracion){
  const mercados = Object.keys(calibracion || {}).filter(m => calibracion[m] && calibracion[m].length > 0);
  if(mercados.length === 0) return '<div class="empty">Todavía no hay suficientes datos para medir la calibración (necesita partidos ya jugados con probabilidad calculada).</div>';

  return mercados.map(mercado => {
    const filas = calibracion[mercado].map(b => {
      const diff = b.diferencia;
      const emoji = Math.abs(diff) <= 5 ? "✅" : (diff < -5 ? "⚠️" : "💪");
      const diffTxt = (diff >= 0 ? "+" : "") + diff.toFixed(0) + "pp";
      return `
        <tr>
          <td class="name">${emoji} ${b.rango}</td>
          <td class="num">${b.total}</td>
          <td class="num">${b.acierto_pct.toFixed(0)}%</td>
          <td class="num">${diffTxt}</td>
        </tr>`;
    }).join("");
    return `
      <p class="bar-label" style="margin:16px 0 8px;">${mercado}</p>
      <table class="cmp-table">
        <thead><tr><th>Dijimos</th><th class="num">n</th><th class="num">Acertó</th><th class="num">Diferencia</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>`;
  }).join("");
}

function renderEstadisticas(data){
  const comparativo = data.comparativo;
  return `
    <section><p class="section-title">Por mercado</p><div class="tickets">${renderTickets(comparativo)}</div></section>
    <section><p class="section-title">Hoy · 7 días · histórico</p>${renderCmpTable(comparativo)}</section>
    ${data.serie_diaria && data.serie_diaria.length > 1 ? `
    <section><p class="section-title">Tendencia diaria — BTTS</p><div class="chart-card"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div></section>` : ""}
    <section>
      <p class="section-title">Detalle</p>
      <div class="grid2">
        <div><p class="bar-label" style="margin-bottom:10px;">Por categoría BTTS</p>${renderBars(comparativo.historico.categorias, CATEGORIA_ORDEN)}</div>
        <div><p class="bar-label" style="margin-bottom:10px;">Por qué se activó JUGAR</p>${renderBars(comparativo.historico.motivos || {}, Object.keys(comparativo.historico.motivos || {}))}</div>
      </div>
    </section>
    <section>
      <p class="section-title">📐 Calibración (probabilidad dicha vs acierto real)</p>
      ${renderCalibracion(comparativo.historico.calibracion)}
    </section>
    <section><p class="section-title">Historial de picks (resueltos)</p>${renderPicksResueltos(data.picks_recientes)}</section>
    <footer class="note">🟢 gana unidades · 🔴 pierde unidades<br/>Con pocos partidos, un solo resultado mueve el % mucho — cautela por debajo de ~15-20 casos.</footer>
  `;
}

function switchTab(id){
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === id));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + id));
  if(id === "stats" && DATA) renderChart(DATA.serie_diaria);
}

function renderHeroPick(picks){
  const el = document.getElementById("heroPick");
  if(!el) return;

  // Prioridad: VIP ELITE > VIP+ BTTS > VIP+ O1.5/O2.5 > VIP BTTS con mayor probabilidad
  const candidatos = [];
  picks.forEach(p => {
    if(p.vip_elite) candidatos.push({p, score: 1000 + (p.prob_btts||0), tier: p.vip_elite, mkt: "Ambos Marcan"});
    else if(p.senal_btts_optimizada === "VIP+" && p.nivel_final === "JUGAR") candidatos.push({p, score: 900 + (p.prob_btts||0), tier: "VIP+", mkt: "Ambos Marcan"});
    else if(p.senal_o15_tier === "VIP" && p.sug_o15 === "JUGAR") candidatos.push({p, score: 800 + (p.prob_o15||0), tier: "VIP", mkt: "Over 1.5"});
    else if(p.senal_o25 === "VIP" && p.sug_o25 === "JUGAR") candidatos.push({p, score: 800 + (p.prob_o25||0), tier: "VIP", mkt: "Over 2.5"});
    else if(p.senal_btts_optimizada === "VIP" && p.nivel_final === "JUGAR") candidatos.push({p, score: 700 + (p.prob_btts||0), tier: "VIP", mkt: "Ambos Marcan"});
  });

  if(candidatos.length === 0){ el.innerHTML = ""; return; }
  candidatos.sort((a,b) => b.score - a.score);
  const top = candidatos[0];
  const prob = top.mkt === "Over 1.5" ? top.p.prob_o15 : top.mkt === "Over 2.5" ? top.p.prob_o25 : top.p.prob_btts;
  const resultado = top.mkt === "Over 1.5" ? top.p.resultado_o15 : top.mkt === "Over 2.5" ? top.p.resultado_o25 : top.p.resultado_btts;
  const rightHtml = resultado === true
    ? `<div class="hero-pick-pct" style="color:var(--win);">✓ Ganada</div>`
    : resultado === false
    ? `<div class="hero-pick-pct" style="color:var(--loss);">✕ Perdida</div>`
    : `<div class="hero-pick-pct">${prob != null ? (prob*100).toFixed(0)+"%" : "—"}</div>`;

  el.innerHTML = `
    <div class="hero-pick-card">
      <div>
        <span class="hero-pick-badge">🔥 Pick del día · ${top.tier}</span>
        <div class="hero-pick-teams">${top.p.local} vs ${top.p.visitante}</div>
        <div class="hero-pick-liga">${top.p.liga || ""} · ${diaBadge(top.p)}</div>
      </div>
      <div class="hero-pick-right">
        ${rightHtml}
        <div class="hero-pick-mkt">${top.mkt}</div>
      </div>
    </div>`;
}

function render(data){
  DATA = data;
  HOY_STR = data.hoy_referencia || "";
  const totalHist = data.comparativo.historico.total_partidos_evaluados;
  const picks = data.picks_hoy || [];

  document.getElementById("updatedTxt").innerHTML =
    `<span class="dot"></span>Actualizado ${new Date(data.actualizado).toLocaleString("es-CO", {dateStyle:"medium", timeStyle:"short"})} · ${totalHist} partidos evaluados en total`;

  renderHeroPick(picks);

  document.getElementById("tabs").innerHTML = TABS.map((t,i) =>
    `<button class="tab-btn ${i===0?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join("");

  const panels = {
    btts: renderMercado(picks, "prob_btts", "nivel_final", "senal_btts_optimizada", "cuota_btts", "¿Ambos equipos marcan?", "resultado_btts"),
    o15: renderMercado(picks, "prob_o15", "sug_o15", "senal_o15_tier", "cuota_o15", "¿Más de 1.5 goles?", "resultado_o15"),
    o25: renderMercado(picks, "prob_o25", "sug_o25", "senal_o25", "cuota_o25", "¿Más de 2.5 goles?", "resultado_o25"),
    combo: `<section><p class="section-title">BTTS + Over 2.5</p>${renderCombo(picks)}</section>`,
    score: renderMarcadorExacto(picks, data.comparativo.historico.marcador_exacto),
    stats: renderEstadisticas(data),
  };

  document.getElementById("app").innerHTML = TABS.map((t,i) =>
    `<div class="tab-panel ${i===0?'active':''}" id="panel-${t.id}">${panels[t.id]}</div>`
  ).join("");

  if(totalHist === 0 && picks.length === 0){
    document.getElementById("app").innerHTML = '<div class="empty">Todavía no hay partidos evaluados. Vuelve pronto.</div>';
  }
}

fetch(DATA_URL, {cache:"no-store"})
  .then(r => { if(!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(render)
  .catch(err => {
    document.getElementById("app").innerHTML = `
      <div class="error">
        No se pudo cargar dashboard_data.json.<br/>(${err.message})<br/><br/>
        Si acabas de configurar esto, corre el workflow de GitHub Actions una vez para generar el archivo.
      </div>`;
  });
</script>
